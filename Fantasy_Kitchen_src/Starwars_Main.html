<html lang="en">

    <link rel="stylesheet" href="Starwars.css" />
    <link href="https://fonts.cdnfonts.com/css/aurebesh" rel="stylesheet" />
    <script src="Header.js" defer></script>
  </head>
  <body class="starwars-theme">
    <div id="Header"></div>

    <main class="holo-container">
      <div class="holo-interface">
        <div class="holo-header">
          <h1 class="aurebesh-text">Galaxy Kitchen</h1>
          <h1 class="english-text">Galaxy Kitchen</h1>
        </div>

        <div class="terminal-window">
          <p id="typewriter">
            Establishing secure connection to Starwars... Success.
          </p>
          <a href="Starwars_Breakfast.html">Breakfast</a>

<style>
  /* Star Wars Theme CSS Generated by Gemini */
  /* Base Theme */
  .starwars-theme {
    background-color: #050505;
    color: #00f2ff; /* Hologram Blue */
    overflow-x: hidden;
  }

  /* Holographic Interface Wrapper */
  .holo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 70vh;
  }

  /* The Language Swap Effect */
  .holo-header {
    position: relative;
    display: inline-block;
    text-align: center;
  }

  .holo-header h1 {
    font-size: 4rem;
    margin: 0;
    transition: opacity 1.5s ease-in-out; /* The slow movie transition */
  }

  .aurebesh-text {
    font-family: "Aurebesh", sans-serif;
    opacity: 1;
  }

  .english-text {
    font-family: Arial, sans-serif;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    opacity: 0;
    text-shadow: 0 0 10px #00f2ff;
  }

  /* Trigger transition on hover */
  .holo-header:hover .aurebesh-text {
    opacity: 0;
  }
  .holo-header:hover .english-text {
    opacity: 1;
  }

  /* Holographic Flicker & Scanline */
  .holo-interface {
    position: relative;
    padding: 20px;
    border: 1px solid rgba(0, 242, 255, 0.2);
    animation: flicker 0.15s infinite;
  }

  .scanline {
    width: 100%;
    height: 2px;
    background: rgba(0, 242, 255, 0.1);
    position: absolute;
    top: 0;
    left: 0;
    animation: scan 4s linear infinite;
  }

  @keyframes scan {
    from {
      top: 0;
    }
    to {
      top: 100%;
    }
  }

  @keyframes flicker {
    0% {
      opacity: 0.95;
    }
    50% {
      opacity: 1;
    }
    100% {
      opacity: 0.98;
    }
  }

  .terminal-window {
    margin-top: 20px;
    font-family: "Courier New", Courier, monospace;
    font-size: 1.2rem;
    border-top: 1px solid rgba(0, 242, 255, 0.3);
    padding-top: 10px;
  }
</style>
